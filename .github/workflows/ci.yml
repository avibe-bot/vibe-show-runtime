name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run bundle:vibe-remote
      - uses: actions/upload-artifact@v4
        with:
          name: vibe-show-runtime-node-${{ matrix.os }}
          path: dist/vibe-show-runtime-node-*.tgz
