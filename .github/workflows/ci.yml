name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # Smoke boots the runtime server and asserts Tailwind utilities reach the served and
      # built CSS (the regression against pages rendering silently unstyled). Gated on Linux
      # — the platform used for CI and github-source installs — to avoid Windows-specific
      # smoke flakiness; the Tailwind build path stays gated on every OS via `npm run check`.
      - run: npm run smoke
        if: matrix.os == 'ubuntu-latest'
      - run: npm run bundle:vibe-remote
      - uses: actions/upload-artifact@v4
        with:
          name: vibe-show-runtime-node-${{ matrix.os }}
          path: dist/vibe-show-runtime-node-*.tgz
